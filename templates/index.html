<!DOCTYPE html>
<html>
<head>
    <title>Study Brain</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f6f9;
            margin:40px;
        }

        h1{
            color:#2c3e50;
        }

        h2{
            color:#34495e;
        }

        form{
            margin-bottom:20px;
        }

        input[type="text"]{
            width:300px;
            padding:8px;
        }

        button{
            padding:8px 15px;
            cursor:pointer;
        }

        .card{
            background:white;
            padding:15px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,.15);
        }

        img{
            margin-top:10px;
            border-radius:8px;
        }

        a{
            text-decoration:none;
        }

        .actions a{
            margin-right:12px;
        }
    </style>

</head>

<body>

<h1>📚 Study Brain</h1>

<div class="card">

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="note" required>
    <button type="submit">Upload</button>
</form>

</div>

<div class="card">

<form action="/search" method="POST">
    <input
        type="text"
        name="query"
        placeholder="Search all indexed notes..."
        required
    >

    <button type="submit">
        Search
    </button>
</form>

</div>

<h2>Uploaded Files</h2>

{% for file in files %}

<div class="card">

{% if file.endswith('.jpg') or file.endswith('.jpeg') or file.endswith('.png') %}

<h3>{{ file }}</h3>

<div class="actions">

<a href="/smart/{{ file }}">📄 Smart Note</a>

<a href="/image/{{ file }}">🖼 View Image</a>

</div>

<br>

<img src="/image/{{ file }}" width="250">

{% else %}

<h3>{{ file }}</h3>

<a href="/note/{{ file }}">Open Note</a>

{% endif %}

</div>

{% endfor %}

</body>
</html>
