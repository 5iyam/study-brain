<!DOCTYPE html>
<html>

<head>

    <title>Time-wise Revision</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            margin:40px;
        }

        .card{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,.15);
        }

        a{
            text-decoration:none;
            display:block;
            padding:10px;
            margin:8px 0;
            background:#3498db;
            color:white;
            border-radius:8px;
            width:220px;
            text-align:center;
        }

        a:hover{
            background:#2980b9;
        }
        input[type="date"]{

        padding:10px;

        width:220px;

    font-size:16px;

}

button{

    background:#3498db;

    color:white;

    border:none;

    border-radius:8px;

    padding:10px 18px;

}

button:hover{

    background:#2980b9;

}

.card{

    margin-bottom:30px;

}

    </style>

</head>

<body>

<h1>📅 Time-wise Revision</h1>

<div class="card">

<h2>⚡ Quick Revision</h2>

<a href="/time/today">📅 Today</a>

<a href="/time/yesterday">📅 Yesterday</a>

<a href="/time/week">📅 Last 7 Days</a>

<a href="/time/month">📅 Last 30 Days</a>

</div>

<div class="card">

<h2>🧠 Custom Revision</h2>

<form action="/time/custom" method="POST">

<label><b>From</b></label>

<br><br>

<input
    type="date"
    name="start_date"
    required
>

<br><br>

<label><b>To</b></label>

<br><br>

<input
    type="date"
    name="end_date"
    required
>

<br><br>

<button type="submit">

🧠 Generate Revision

</button>

</form>

</div>

<br>

<a href="/">⬅ Back to Home</a>

</body>

</html>
