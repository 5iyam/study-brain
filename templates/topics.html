<!DOCTYPE html>
<html>

<head>
    <title>Topics</title>
</head>

<body>

<h1>📂 Topics</h1>

<a href="/">⬅ Back to Home</a>

<hr>

{% if topic_count %}

<ul>

{% for topic, count in topic_count.items() %}

<li>

<a href="/topic/{{ topic }}">

<b>{{ topic }}</b>

</a>

({{ count }} note{{ "s" if count > 1 else "" }})

</li>

{% endfor %}

</ul>

{% else %}

<p>No topics found.</p>

{% endif %}

</body>
</html>
